<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox | מפתחת משחקים</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6">

    <main class="glass max-w-lg w-full py-12 px-8 rounded-[2rem] shadow-2xl text-center relative overflow-hidden">
        <!-- Decorative Glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-pink-500/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl"></div>

        <!-- Profile Icon with Animation -->
        <div class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-pink-500 rounded-full blur-xl opacity-30 animate-pulse-soft"></div>
            <div class="relative w-24 h-24 rounded-full bg-slate-800 border-2 border-white/20 flex items-center justify-center text-5xl shadow-inner">
                🦊
            </div>
        </div>

        <!-- Header -->
        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight leading-tight">
            היי, אני <span class="bg-clip-text text-transparent bg-gradient-to-l from-pink-400 to-indigo-400">Fox</span>
        </h1>
        
        <!-- Description -->
        <p class="text-lg md:text-xl text-slate-300 font-light leading-relaxed">
            מפתחת צעירה שאוהבת <span class="text-white font-medium">ליצור משחקים</span> 🎮
        </p>

        <!-- Minimal Action -->
        <div class="mt-10">
            <!-- קישור מעודכן לפרופיל הגיטהאב שלך -->
            <a href="https://github.com/Ella12Fox12" target="_blank" class="inline-flex items-center gap-2 px-6 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 hover:text-white transition-all text-sm font-bold tracking-widest uppercase">
                <span>GitHub</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
            </a>
        </div>
    </main>

</body>
</html>
